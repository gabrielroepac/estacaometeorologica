<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ThingSpeak - Canal 3321343</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

   <div class="dashboard-container">
        <h1>Monitoramento de Clima (Canal 3321343)</h1>

        <div class="grid-valores">
            <div class="card-valor">
                <div class="card-titulo">Temperatura Atual</div>
                <div id="txt-field1" class="valor-principal cor-temperatura">--</div>
            </div>
            <div class="card-valor">
                <div class="card-titulo">Umidade Atual</div>
                <div id="txt-field2" class="valor-principal cor-umidade">--</div>
            </div>
        </div>

        <div class="grafico-wrapper">
            <canvas id="meuGrafico"></canvas>
        </div>

        <div class="rodape">
            <div>Atualização automática (15s)</div>
            <div id="status-conexao">Conectando...</div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script.js"></script>
</body>
</html>
